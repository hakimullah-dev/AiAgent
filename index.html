<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aria — Clinic Receptionist</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #eef2f7;
    --surface: #ffffff;
    --primary: #2563eb;
    --primary-light: #dbeafe;
    --primary-dark: #1d4ed8;
    --green: #10b981;
    --green-light: #d1fae5;
    --red: #ef4444;
    --red-light: #fee2e2;
    --text: #0f172a;
    --subtext: #64748b;
    --border: #e2e8f0;
    --aria-bubble: #eff6ff;
    --user-bubble: #2563eb;
    --shadow: 0 4px 24px rgba(37,99,235,0.10);
    --shadow-sm: 0 2px 8px rgba(15,23,42,0.08);
    --radius: 20px;
    --radius-sm: 12px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(37,99,235,0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(16,185,129,0.05) 0%, transparent 50%);
  }

  /* ── SPLASH ── */
  #splash {
    background: var(--surface);
    border-radius: 28px;
    padding: 48px 36px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow);
    text-align: center;
    animation: fadeUp 0.5s ease both;
  }

  .splash-logo {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--primary), #60a5fa);
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 8px 24px rgba(37,99,235,0.3);
  }

  .splash-logo svg { width: 36px; height: 36px; color: white; }

  .splash-title {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .splash-sub {
    font-size: 14px;
    color: var(--subtext);
    margin-bottom: 36px;
    line-height: 1.6;
  }

  .splash-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--subtext);
    text-align: left;
    margin-bottom: 8px;
    display: block;
  }

  .splash-input {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 16px;
  }

  .splash-input:focus { border-color: var(--primary); }
  .splash-input.error { border-color: var(--red); }

  .splash-error {
    font-size: 12px;
    color: var(--red);
    text-align: left;
    margin-top: -10px;
    margin-bottom: 12px;
    display: none;
  }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(37,99,235,0.35);
  }

  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.4); }
  .btn-primary:active { transform: translateY(0); }

  /* ── CHAT APP ── */
  #app {
    display: none;
    width: 100%;
    max-width: 480px;
    height: 92vh;
    max-height: 820px;
    background: var(--surface);
    border-radius: 28px;
    box-shadow: var(--shadow);
    flex-direction: column;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  /* Header */
  .chat-header {
    padding: 18px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .header-avatar {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--primary), #60a5fa);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(37,99,235,0.25);
  }

  .header-avatar svg { width: 22px; height: 22px; color: white; }

  .header-info { flex: 1; }

  .header-name {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--text);
    line-height: 1;
    margin-bottom: 3px;
  }

  .header-sub {
    font-size: 11.5px;
    color: var(--subtext);
  }

  .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--green);
    border-radius: 50%;
    margin-right: 5px;
    animation: pulse-green 2s infinite;
  }

  .header-actions { display: flex; gap: 8px; }

  .icon-btn {
    width: 36px; height: 36px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--subtext);
    transition: all 0.15s;
    font-size: 13px;
    font-family: inherit;
  }

  .icon-btn:hover { background: var(--bg); color: var(--text); }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-group { display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: msgIn 0.25s ease both;
  }

  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--primary), #60a5fa);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
    margin-bottom: 2px;
  }

  .bubble {
    max-width: 78%;
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 14.5px;
    line-height: 1.55;
    position: relative;
  }

  .bubble.aria {
    background: var(--aria-bubble);
    color: var(--text);
    border-bottom-left-radius: 5px;
  }

  .bubble.user {
    background: var(--user-bubble);
    color: white;
    border-bottom-right-radius: 5px;
  }

  /* Voice transcription label inside user bubble */
  .voice-label {
    display: block;
    font-size: 10.5px;
    opacity: 0.75;
    margin-bottom: 3px;
    font-weight: 500;
  }

  .bubble-time {
    font-size: 10.5px;
    color: var(--subtext);
    margin-top: 3px;
    padding: 0 4px;
  }

  .msg-row.user .bubble-time { text-align: right; }

  /* Audio player in bubble */
  .audio-player {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(37,99,235,0.08);
    border-radius: 10px;
    padding: 8px 10px;
  }

  .audio-play-btn {
    width: 28px; height: 28px;
    background: var(--primary);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: white;
    flex-shrink: 0;
    transition: transform 0.1s;
  }

  .audio-play-btn:hover { transform: scale(1.1); }

  .audio-progress {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    cursor: pointer;
  }

  .audio-progress-fill {
    height: 100%;
    background: var(--primary);
    width: 0%;
    transition: width 0.1s linear;
  }

  .audio-time { font-size: 11px; color: var(--subtext); white-space: nowrap; }

  /* Typing indicator */
  .typing-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: msgIn 0.25s ease both;
  }

  .typing-bubble {
    background: var(--aria-bubble);
    border-radius: 18px;
    border-bottom-left-radius: 5px;
    padding: 12px 16px;
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .dot {
    width: 7px; height: 7px;
    background: var(--subtext);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  /* Quick replies */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 4px 0 8px 36px;
    animation: msgIn 0.3s ease both;
  }

  .qr-chip {
    padding: 7px 14px;
    border: 1.5px solid var(--primary);
    border-radius: 20px;
    font-size: 13px;
    color: var(--primary);
    background: white;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: all 0.15s;
  }

  .qr-chip:hover { background: var(--primary); color: white; }

  /* Slot picker */
  .slot-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin: 4px 0 4px 36px;
    animation: msgIn 0.3s ease both;
    box-shadow: var(--shadow-sm);
  }

  .slot-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--subtext);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .slot-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .slot-btn {
    padding: 10px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: 1.5px solid transparent;
    text-align: center;
  }

  .slot-btn.available {
    background: white;
    border-color: var(--primary);
    color: var(--primary);
  }

  .slot-btn.available:hover {
    background: var(--primary);
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(37,99,235,0.25);
  }

  .slot-btn.available.selected {
    background: var(--primary);
    color: white;
  }

  .slot-btn.booked {
    background: #f1f5f9;
    border-color: #e2e8f0;
    color: #94a3b8;
    cursor: not-allowed;
    pointer-events: none;
    text-decoration: line-through;
    filter: blur(0.4px);
    opacity: 0.6;
  }

  /* System message */
  .sys-msg {
    text-align: center;
    font-size: 12px;
    color: var(--red);
    background: var(--red-light);
    border-radius: 8px;
    padding: 8px 12px;
    margin: 4px 0;
  }

  .offline-banner {
    background: #fef3c7;
    color: #92400e;
    text-align: center;
    font-size: 12.5px;
    font-weight: 500;
    padding: 8px;
    display: none;
  }

  /* Input bar */
  .input-bar {
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: var(--primary); }

  #textInput {
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 14.5px;
    color: var(--text);
    outline: none;
    resize: none;
    min-height: 20px;
    max-height: 100px;
    line-height: 1.4;
  }

  #textInput::placeholder { color: #94a3b8; }

  .char-count {
    font-size: 11px;
    color: var(--subtext);
    text-align: right;
    margin-top: 4px;
    display: none;
  }

  .send-btn, .mic-btn {
    width: 44px; height: 44px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .send-btn {
    background: var(--primary);
    color: white;
    box-shadow: 0 4px 12px rgba(37,99,235,0.3);
  }

  .send-btn:hover { background: var(--primary-dark); transform: scale(1.05); }
  .send-btn:disabled { background: var(--border); box-shadow: none; cursor: not-allowed; transform: none; }

  .mic-btn {
    background: var(--bg);
    color: var(--subtext);
    border: 2px solid var(--border);
  }

  .mic-btn:hover { background: var(--red-light); color: var(--red); border-color: var(--red); }
  .mic-btn.recording {
    background: var(--red);
    color: white;
    border-color: var(--red);
    animation: pulse-red 1s infinite;
  }

  /* Recording bar */
  .recording-bar {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--red-light);
    border-top: 1px solid #fecaca;
    font-size: 13px;
    color: var(--red);
    font-weight: 500;
    flex-shrink: 0;
  }

  .recording-timer { font-variant-numeric: tabular-nums; }

  /* VAD level indicator */
  .vad-bar {
    flex: 1;
    height: 4px;
    background: #fecaca;
    border-radius: 2px;
    overflow: hidden;
  }

  .vad-bar-fill {
    height: 100%;
    background: var(--red);
    width: 0%;
    transition: width 0.08s ease;
    border-radius: 2px;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
    50% { box-shadow: 0 0 0 4px rgba(16,185,129,0); }
  }

  @keyframes pulse-red {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
  }

  /* Responsive */
  @media (max-width: 520px) {
    body { padding: 0; align-items: flex-end; }
    #app { border-radius: 24px 24px 0 0; max-height: 100vh; height: 100dvh; }
    #splash { border-radius: 24px; margin: 16px; }
  }
</style>
</head>
<body>

<!-- OFFLINE BANNER -->
<div class="offline-banner" id="offlineBanner">⚠️ You appear to be offline</div>

<!-- SPLASH SCREEN -->
<div id="splash">
  <div class="splash-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
    </svg>
  </div>
  <h1 class="splash-title">Aria</h1>
  <p class="splash-sub">Your clinic receptionist<br>Available 24 hours, 7 days a week</p>
  <label class="splash-label" for="phoneInput">Your mobile number</label>
  <input class="splash-input" id="phoneInput" type="tel" placeholder="+61XXXXXXXXX" maxlength="14">
  <p class="splash-error" id="phoneError">Please enter a valid mobile number (e.g. +61412345678)</p>
  <button class="btn-primary" onclick="startChat()">Start Chat</button>
</div>

<!-- CHAT APP -->
<div id="app" style="display:none; flex-direction:column;">
  <div class="chat-header">
    <div class="header-avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    </div>
    <div class="header-info">
      <div class="header-name">Aria</div>
      <div class="header-sub"><span class="status-dot"></span>Online — Clinic Receptionist</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="newChat()" title="New chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
  </div>

  <div id="messages"></div>

  <!-- Recording bar — shown while mic is active -->
  <div class="recording-bar" id="recordingBar">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>
    <span>Listening — speak now, auto-sends when you stop</span>
    <div class="vad-bar"><div class="vad-bar-fill" id="vadFill"></div></div>
    <span class="recording-timer" id="recTimer">0:00</span>
  </div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="textInput" placeholder="Type your message..." rows="1"
        oninput="onInput()" onkeydown="onKeyDown(event)"></textarea>
      <div class="char-count" id="charCount"></div>
    </div>
    <button class="mic-btn" id="micBtn" onclick="toggleRecording()" title="Tap to speak — auto-sends on silence">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <button class="send-btn" id="sendBtn" onclick="sendText()" title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const WEBHOOK_URL = 'https://n8n.srv1504760.hstgr.cloud/webhook/aria-v9';
const WEBHOOK_KEY = 'aria-clinic-2026';

// ─── STATE ────────────────────────────────────────────────────────────────────
let patientPhone = '';
let sessionId = '';
let isWaiting = false;
let isRecording = false;
let recognition = null;
let recInterval = null;
let recSeconds = 0;
let currentAudio = null;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

// ─── STARTUP ──────────────────────────────────────────────────────────────────
function startChat() {
  const input = document.getElementById('phoneInput');
  const err = document.getElementById('phoneError');
  const val = input.value.trim();

  const valid = /^\+\d{9,13}$/.test(val);
  if (!valid) {
    input.classList.add('error');
    err.style.display = 'block';
    return;
  }

  input.classList.remove('error');
  err.style.display = 'none';
  patientPhone = val;
  sessionId = 'sess_' + Date.now() + Math.random().toString(36).slice(2);

  document.getElementById('splash').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';

  addAriaMessage(
    "Hi there! I'm Aria, your clinic receptionist. How can I help you today?",
    null,
    ['Book appointment', 'Cancel appointment', 'Reschedule']
  );
}

document.getElementById('phoneInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startChat();
});

// ─── NEW CHAT ─────────────────────────────────────────────────────────────────
function newChat() {
  if (!confirm('Start a new conversation?')) return;
  sessionId = 'sess_' + Date.now() + Math.random().toString(36).slice(2);
  document.getElementById('messages').innerHTML = '';
  addAriaMessage(
    "Hi again! I'm Aria. How can I help you today?",
    null,
    ['Book appointment', 'Cancel appointment', 'Reschedule']
  );
}

// ─── SEND TEXT ────────────────────────────────────────────────────────────────
function sendText() {
  const ta = document.getElementById('textInput');
  const text = ta.value.trim();
  if (!text || isWaiting) return;
  ta.value = '';
  onInput();
  removeQuickReplies();
  addUserMessage(text);
  sendToWebhook({ session_id: sessionId, user_input: text, patient_phone: patientPhone });
}

function onKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
}

function onInput() {
  const ta = document.getElementById('textInput');
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
  const cc = document.getElementById('charCount');
  if (ta.value.length > 200) {
    cc.style.display = 'block';
    cc.textContent = ta.value.length + ' characters';
  } else {
    cc.style.display = 'none';
  }
}

// ─── VOICE RECORDING WITH VAD ─────────────────────────────────────────────────
function toggleRecording() {
  if (isWaiting) return;
  if (!isRecording) {
    startRecording();
  } else {
    stopRecording();
  }
}

function startRecording() {
  if (!SpeechRecognition) {
    showSysMsg('Voice input is not supported in this browser. Please type your message.');
    return;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-AU';

  recognition.onstart = () => {
    isRecording = true;
    recSeconds = 0;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('recordingBar').style.display = 'flex';
    document.getElementById('recTimer').textContent = '0:00';
    recInterval = setInterval(() => {
      recSeconds++;
      const m = Math.floor(recSeconds / 60);
      const s = recSeconds % 60;
      document.getElementById('recTimer').textContent = m + ':' + String(s).padStart(2, '0');
      document.getElementById('vadFill').style.width = Math.min(recSeconds * 8, 90) + '%';
    }, 1000);
  };

  recognition.onresult = (event) => {
    const transcript = Array.from(event.results)
      .map(r => r[0].transcript).join('').trim();
    if (event.results[event.results.length - 1].isFinal && transcript) {
      stopRecordingUI();
      removeQuickReplies();
      addUserMessage('🎤 ' + transcript);
      sendToWebhook({ session_id: sessionId, user_input: transcript, patient_phone: patientPhone });
    }
  };

  recognition.onerror = (event) => {
    stopRecordingUI();
    if (event.error === 'not-allowed') {
      showSysMsg('Microphone access was denied. Please allow it in your browser settings.');
    } else if (event.error !== 'no-speech' && event.error !== 'aborted') {
      showSysMsg('Voice recognition error. Please try again or type your message.');
    }
  };

  recognition.onend = () => { stopRecordingUI(); };

  recognition.start();
}

function stopRecording() {
  if (recognition) { recognition.abort(); recognition = null; }
  stopRecordingUI();
}

function stopRecordingUI() {
  clearInterval(recInterval);
  isRecording = false;
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('recordingBar').style.display = 'none';
  document.getElementById('vadFill').style.width = '0%';
}

// ─── WEBHOOK ──────────────────────────────────────────────────────────────────
async function sendToWebhook(body) {
  setWaiting(true);
  showTyping();
  const timeout = setTimeout(() => {
    hideTyping();
    setWaiting(false);
    showSysMsg("Sorry, I'm having trouble connecting. Please try again.");
  }, 30000);

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Aria-Key': WEBHOOK_KEY
      },
      body: JSON.stringify(body),
      signal: AbortSignal.timeout(30000)
    });
    clearTimeout(timeout);
    hideTyping();
    setWaiting(false);

    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    handleResponse(data);
  } catch (err) {
    clearTimeout(timeout);
    hideTyping();
    setWaiting(false);
    if (!navigator.onLine) return;
    showSysMsg("Sorry, I'm having trouble connecting. Please try again.");
  }
}

function handleResponse(data) {
  const text  = data.speechText || data.text || '';
  const audio = data.audio_base64 || data.audio || '';
  const type  = data.type || 'message';

  let quickReplies = null;

  if (type === 'slot_picker' && data.slots && data.slots.length > 0) {
    addAriaMessage(text, audio, null);
    addSlotPicker(data.slots);
  } else {
    const lc = text.toLowerCase();
    if (lc.includes('confirmed') || lc.includes('booked')) {
      quickReplies = ['Book another', 'Done'];
    } else if (lc.includes('cancelled')) {
      quickReplies = ['Book new appointment', 'Done'];
    } else if (lc.includes('help') || lc.includes('how can i')) {
      quickReplies = ['Book appointment', 'Cancel appointment', 'Reschedule'];
    }
    addAriaMessage(text, audio, quickReplies);
  }
}

// ─── MESSAGES ─────────────────────────────────────────────────────────────────
function addAriaMessage(text, audioB64, quickReplies) {
  const msgs = document.getElementById('messages');
  const now = formatTime();

  const row = document.createElement('div');
  row.className = 'msg-row';

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = 'A';

  const col = document.createElement('div');
  col.style.cssText = 'display:flex;flex-direction:column;max-width:78%;';

  const bubble = document.createElement('div');
  bubble.className = 'bubble aria';
  bubble.textContent = text;

  if (audioB64) {
    const player = buildAudioPlayer(audioB64);
    bubble.appendChild(player);
    // Auto-play the response audio
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    const a = new Audio('data:audio/mpeg;base64,' + audioB64);
    currentAudio = a;
    a.play().catch(() => {});
  }

  const time = document.createElement('div');
  time.className = 'bubble-time';
  time.textContent = now;

  col.appendChild(bubble);
  col.appendChild(time);
  row.appendChild(av);
  row.appendChild(col);
  msgs.appendChild(row);

  if (quickReplies && quickReplies.length > 0) {
    addQuickReplies(quickReplies);
  }

  scrollBottom();
}

// bubbleId is optional — used for voice placeholders
function addUserMessage(text, bubbleId) {
  const msgs = document.getElementById('messages');
  const now = formatTime();

  const row = document.createElement('div');
  row.className = 'msg-row user';

  const col = document.createElement('div');
  col.style.cssText = 'display:flex;flex-direction:column;max-width:78%;';

  const bubble = document.createElement('div');
  bubble.className = 'bubble user';
  bubble.textContent = text;
  if (bubbleId) bubble.id = bubbleId;

  const time = document.createElement('div');
  time.className = 'bubble-time';
  time.textContent = now;

  col.appendChild(bubble);
  col.appendChild(time);
  row.appendChild(col);
  msgs.appendChild(row);
  scrollBottom();
}

function addQuickReplies(replies) {
  removeQuickReplies();
  const msgs = document.getElementById('messages');
  const qr = document.createElement('div');
  qr.className = 'quick-replies';
  qr.id = 'quickReplies';
  replies.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'qr-chip';
    btn.textContent = r;
    btn.onclick = () => {
      removeQuickReplies();
      addUserMessage(r);
      sendToWebhook({ session_id: sessionId, user_input: r, patient_phone: patientPhone });
    };
    qr.appendChild(btn);
  });
  msgs.appendChild(qr);
  scrollBottom();
}

function removeQuickReplies() {
  const el = document.getElementById('quickReplies');
  if (el) el.remove();
}

function addSlotPicker(slots) {
  const msgs = document.getElementById('messages');
  const card = document.createElement('div');
  card.className = 'slot-card';
  card.id = 'slotCard';

  const title = document.createElement('div');
  title.className = 'slot-title';
  title.textContent = 'Select a time';
  card.appendChild(title);

  const allBooked = slots.every(s => s.status === 'booked');
  if (allBooked) {
    const msg = document.createElement('div');
    msg.style.cssText = 'font-size:14px;color:var(--subtext);text-align:center;padding:12px 0;';
    msg.textContent = 'No available slots for this date. Would you like to try another day?';
    card.appendChild(msg);
  } else {
    const grid = document.createElement('div');
    grid.className = 'slot-grid';
    slots.forEach(slot => {
      const btn = document.createElement('button');
      btn.className = 'slot-btn ' + slot.status;
      btn.textContent = slot.label || slot.time;
      if (slot.status === 'available') {
        btn.onclick = () => {
          grid.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          setTimeout(() => {
            const sc = document.getElementById('slotCard');
            if (sc) sc.remove();
          }, 400);
          const msg = `I'd like the ${slot.label || slot.time} slot please`;
          removeQuickReplies();
          addUserMessage(msg);
          sendToWebhook({
            session_id: sessionId,
            user_input: `I'd like to book the ${slot.label || slot.time} slot (${slot.datetime})`,
            patient_phone: patientPhone
          });
        };
      }
      grid.appendChild(btn);
    });
    card.appendChild(grid);
  }
  msgs.appendChild(card);
  scrollBottom();
}

// ─── AUDIO PLAYER ─────────────────────────────────────────────────────────────
function buildAudioPlayer(b64) {
  const wrap = document.createElement('div');
  wrap.className = 'audio-player';

  const playBtn = document.createElement('button');
  playBtn.className = 'audio-play-btn';
  playBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;

  const progress = document.createElement('div');
  progress.className = 'audio-progress';
  const fill = document.createElement('div');
  fill.className = 'audio-progress-fill';
  progress.appendChild(fill);

  const timeEl = document.createElement('div');
  timeEl.className = 'audio-time';
  timeEl.textContent = '0:00';

  const audio = new Audio('data:audio/mpeg;base64,' + b64);

  audio.ontimeupdate = () => {
    if (audio.duration) {
      fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      timeEl.textContent = formatDur(audio.currentTime);
    }
  };

  audio.onended = () => {
    playBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
    fill.style.width = '0%';
  };

  playBtn.onclick = () => {
    if (audio.paused) {
      if (currentAudio && currentAudio !== audio) { currentAudio.pause(); }
      audio.play();
      currentAudio = audio;
      playBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
    } else {
      audio.pause();
      playBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
    }
  };

  progress.onclick = (e) => {
    const rect = progress.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    if (audio.duration) audio.currentTime = pct * audio.duration;
  };

  wrap.appendChild(playBtn);
  wrap.appendChild(progress);
  wrap.appendChild(timeEl);
  return wrap;
}

// ─── TYPING INDICATOR ─────────────────────────────────────────────────────────
function showTyping() {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typingRow';

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = 'A';

  const bub = document.createElement('div');
  bub.className = 'typing-bubble';
  [1,2,3].forEach(() => {
    const d = document.createElement('div');
    d.className = 'dot';
    bub.appendChild(d);
  });

  row.appendChild(av);
  row.appendChild(bub);
  msgs.appendChild(row);
  scrollBottom();
}

function hideTyping() {
  const el = document.getElementById('typingRow');
  if (el) el.remove();
}

function showSysMsg(text) {
  const msgs = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'sys-msg';
  el.textContent = text;
  msgs.appendChild(el);
  scrollBottom();
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function setWaiting(v) {
  isWaiting = v;
  document.getElementById('sendBtn').disabled = v;
  document.getElementById('textInput').disabled = v;
}

function scrollBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function formatTime() {
  const d = new Date();
  return d.toLocaleTimeString('en-AU', { hour: 'numeric', minute: '2-digit', hour12: true });
}

function formatDur(s) {
  const m = Math.floor(s / 60);
  return m + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─── OFFLINE DETECTION ────────────────────────────────────────────────────────
window.addEventListener('online',  () => document.getElementById('offlineBanner').style.display = 'none');
window.addEventListener('offline', () => document.getElementById('offlineBanner').style.display = 'block');
</script>
